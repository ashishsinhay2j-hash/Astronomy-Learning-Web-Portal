{% extends "base.html" %}
{% block content %}
<h2 style="text-align: center; color: var(--primary);"><i class="fas fa-chart-pie"></i> Your Cosmic Progress</h2>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 30px 0;">
    <div class="card" style="text-align: center; border-bottom: 4px solid var(--primary);">
        <h1 style="margin: 0; font-size: 2.5rem;">{{ total_attempts }}</h1>
        <p style="color: #888; text-transform: uppercase; font-size: 0.7rem;">Missions Joined</p>
    </div>
    <div class="card" style="text-align: center; border-bottom: 4px solid #2ecc71;">
        <h1 style="margin: 0; font-size: 2.5rem;">{{ best_score }}%</h1>
        <p style="color: #888; text-transform: uppercase; font-size: 0.7rem;">Peak Performance</p>
    </div>
    <div class="card" style="text-align: center; border-bottom: 4px solid #f1c40f;">
        <h1 style="margin: 0; font-size: 2.5rem;">{{ completed }}</h1>
        <p style="color: #888; text-transform: uppercase; font-size: 0.7rem;">Nodes Mastered</p>
    </div>
</div>

<div class="card">
    <h3><i class="fas fa-history"></i> Recent Activity Logs</h3>
    <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
        <tr style="text-align: left; border-bottom: 2px solid var(--primary);">
            <th style="padding: 10px;">Mission ID</th>
            <th>Calculated Score</th>
            <th>Final Status</th>
        </tr>
        <tr style="border-bottom: 1px solid #333;">
            <td style="padding: 10px;">QUIZ_MASTER_01</td>
            <td>{{ average_score }}%</td>
            <td style="color: #2ecc71; font-weight: bold;">SUCCESS</td>
        </tr>
    </table>
</div>
{% endblock %}
