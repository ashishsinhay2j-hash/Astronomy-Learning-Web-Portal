{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 450px; margin: auto;">
    <h2 style="text-align: center;">Mission Control Login</h2>
    
    <form method="POST">
        <label>Email Address</label>
        <input type="email" name="username" placeholder="name@example.com" required>

        <label>Access Password</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <label>Access Role</label>
        <select name="role">
            <option value="2">Student</option>
            <option value="3">Teacher</option>
            <option value="1">Admin</option>
        </select>

        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Launch Dashboard</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="/forgot" style="color: var(--primary); font-size: 14px;">Lost your access key?</a>
    </div>
</div>
{% endblock %}
