<!DOCTYPE html>
<html>
<head>
    <title>Astronomy Learning Portal</title>
    <style>
       body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #0b0c2a;
    color: white;
}

.navbar {
    background: #11144c;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.navbar a:hover {
    color: #00d4ff;
}

.container {
    padding: 30px;
}

/* CARD DESIGN */
.card {
    background: #1c1f5a;
    padding: 20px;
    border-radius: 12px;
    margin: 15px auto;
    width: 70%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: 0.3s;
}
h2 {
    text-align: center;
    color: #00d4ff;
}

iframe {
    border-radius: 10px;
}

.card:hover {
    transform: scale(1.02);
}

button, a.button {
    display: inline-block;
    padding: 10px 15px;
    background: #00d4ff;
    color: black;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}

button:hover, a.button:hover {
    background: #00aacc;
}
       .card {
    background-color: #1c1f5a;
    padding: 25px;
    border-radius: 10px;
    width: 60%;   /* increase width */
    margin: auto;
    text-align: left;
}
        .card p {
    line-height: 1.6;
    margin-bottom: 10px;
}
.card h3 {
    color: #00d4ff;
    margin-top: 20px;
}
       input[type="text"],
input[type="email"],
input[type="password"] {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

input[type="radio"] {
    width: auto;
    margin-right: 8px;
}

        button {
            padding: 10px 20px;
            border: none;
            background-color: #00d4ff;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00aacc;
        }

        footer {
    margin-top: 50px;
    padding: 15px;
    background-color: #11144c;
}

/* move this outside */
.option {
    
    margin: 8px 0;
}
.option input {
    margin-right: 10px;
}
.option label {
    cursor: pointer;
}

    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>

{% if session.get("user") %}
    <a href="/dashboard">Dashboard</a>
    <a href="/courses">Courses</a>
    <a href="/logout">Logout</a>
    <a href="/courses">Courses</a>

    {% if session.get("role") == 1 %}
        <a href="/admin">Admin</a>
    {% endif %}
{% else %}
    <a href="/login">Login</a>
    <a href="/register">Register</a>
{% endif %}
</div>
<div class="container">
    {% block content %}
    
    {% endblock %}
</div>

<footer>
    © 2026 Astronomy Learning Web Portal
</footer>

</body>
</html>
