{% extends "base.html" %}
{% block content %}

<h2>Student Results</h2>

<table border="1" style="width:100%; text-align:center;">
    <tr>
        <th>Name</th>
        <th>Score</th>
    </tr>

    {% for d in data %}
    <tr>
        <td>{{ d.username }}</td>
        <td>{{ d.score }}/{{ d.total }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
