{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

{% for l in lessons %}

<div class="card">

    <h3>{{ l.title }}</h3>

    {% if l.video_url %}
        <iframe width="100%" height="300"
            src="{{ l.video_url }}"
            frameborder="0"
            allowfullscreen>
        </iframe>
    {% else %}
        <p>No video</p>
    {% endif %}

</div>

{% endfor %}

{% endblock %}
