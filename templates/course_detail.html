{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<!-- 🎬 MAIN PLAYER -->
{% if lessons and lessons[0].video_url %}
<div id="player" style="cursor:pointer;" onclick="loadVideo('{{ lessons[0].video_url }}')">

    <img 
        src="https://img.youtube.com/vi/{{ lessons[0].video_url.split('/')[-1] }}/0.jpg"
        width="100%" height="400"
    >

    <p style="text-align:center;">▶ Click to Play</p>

</div>
{% endif %}

<br>

<!-- 📜 LESSON LIST -->
<h3>Lessons</h3>

{% for l in lessons %}
<div class="card lesson-item" data-url="{{ l.video_url }}" style="cursor:pointer;">

    <img 
        src="https://img.youtube.com/vi/{{ l.video_url.split('/')[-1] }}/0.jpg"
        width="100%"
    >

    <h4>{{ l.title }}</h4>

</div>
{% endfor %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    let lessons = document.querySelectorAll(".lesson-item");
    let player = document.getElementById("player");
    let currentIndex = 0;
    let autoTimer;

    function loadVideoByIndex(index) {
        currentIndex = index;

        let url = lessons[index].getAttribute("data-url");

        player.innerHTML = `
            <iframe id="videoFrame" width="100%" height="400"
                src="${url}?autoplay=1"
                frameborder="0"
                allowfullscreen>
            </iframe>
        `;

        startAutoNext();
    }

    function startAutoNext() {
        clearTimeout(autoTimer);

        autoTimer = setTimeout(() => {
            if (currentIndex < lessons.length - 1) {
                loadVideoByIndex(currentIndex + 1);
            }
        }, 300000); // 5 minutes
    }

    // ✅ FIXED CLICK HANDLER
    lessons.forEach((item, index) => {
        item.addEventListener("click", function () {
            loadVideoByIndex(index);
        });
    });

});
</script>
{% endblock %}
