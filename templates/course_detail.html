{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<!-- 🎬 PLAYER -->
<div id="player" style="max-width:800px; margin:auto;">

    <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px;">
        <iframe
            src=""
            id="iframePlayer"
            style="position:absolute; top:0; left:0; width:100%; height:100%;"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <p style="text-align:center; margin-top:10px;">Click a lesson to play ▶️</p>

</div>

<br>

<!-- 📜 LESSON LIST -->
<h3>Lessons</h3>

<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:15px;">

{% for l in lessons %}
<div class="card lesson-item"
     data-url="{{ l.video_url }}"
     style="cursor:pointer; padding:10px;">

    <img 
        src="https://img.youtube.com/vi/{{ l.video_url.split('/')[-1] }}/0.jpg"
        style="width:100%; border-radius:10px;"
    >

    <h4 style="margin-top:10px;">{{ l.title }}</h4>

</div>
{% endfor %}

</div>

<br>

<a href="/quiz/{{ course.course_id }}" class="btn" style="background:#e67e22;">
    🧠 Start Quiz
</a>

<!-- ✅ SCRIPT -->
<script>
window.onload = function () {

    var items = document.getElementsByClassName("lesson-item");
    var player = document.getElementById("iframePlayer");

    for (let i = 0; i < items.length; i++) {

        items[i].onclick = function () {

            var url = this.getAttribute("data-url");

            player.src = url + "?autoplay=1";
        };
    }

};
</script>

{% endblock %}
