{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<!-- 🎬 PLAYER -->
<div id="player">
    <p style="text-align:center;">Click a lesson to play ▶️</p>
</div>

<br>

<!-- 📜 LESSON LIST -->
<h3>Lessons</h3>

{% for l in lessons %}
<div class="card lesson-item" data-url="{{ l.video_url }}" style="cursor:pointer; margin-bottom:10px;">

    <img 
        src="https://img.youtube.com/vi/{{ l.video_url.split('/')[-1] }}/0.jpg"
        width="100%"
    >

    <h4>{{ l.title }}</h4>

</div>
{% endfor %}

<!-- ✅ FINAL SCRIPT -->
<script>
window.onload = function () {

    const lessons = document.querySelectorAll(".lesson-item");
    const player = document.getElementById("player");

    lessons.forEach(function(item) {

        item.addEventListener("click", function() {

            let url = item.getAttribute("data-url");

            player.innerHTML = `
                <iframe width="100%" height="400"
                    src="${url}?autoplay=1"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            `;

        });

    });

};
</script>

{% endblock %}
