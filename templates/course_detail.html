{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<!-- 🎬 MAIN PLAYER -->
{% if lessons and lessons[0].video_url %}
<div id="player" style="cursor:pointer;" onclick="loadVideo('{{ lessons[0].video_url }}')">

    <img 
        src="https://img.youtube.com/vi/{{ lessons[0].video_url.split('/')[-1] }}/0.jpg"
        width="100%" height="400"
    >

    <p style="text-align:center;">▶ Click to Play</p>

</div>
{% endif %}

<br>

<!-- 📜 LESSON LIST -->
<h3>Lessons</h3>

{% for l in lessons %}
<div class="card" onclick="loadVideo('{{ l.video_url }}')" style="cursor:pointer;">

    <img 
        src="https://img.youtube.com/vi/{{ l.video_url.split('/')[-1] }}/0.jpg"
        width="100%"
    >

    <h4>{{ l.title }}</h4>

</div>
{% endfor %}

<!-- ⚙️ SCRIPT -->
<script>
function loadVideo(url) {
    document.getElementById("player").innerHTML = `
        <iframe width="100%" height="400"
            src="${url}?autoplay=1"
            frameborder="0"
            allowfullscreen>
        </iframe>
    `;
}
</script>

{% endblock %}
