{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<!-- 🎬 PLAYER -->
<div id="player">
    <p style="text-align:center;">Click a lesson to play ▶️</p>
</div>

<br>

<!-- 📜 LESSON LIST -->
<h3>Lessons</h3>


{% for l in lessons %}
<div class="card lesson-item" data-url="{{ l.video_url }}" 
     style="cursor:pointer; margin-bottom:10px;">

    <img 
        src="https://img.youtube.com/vi/{{ l.video_url.split('/')[-1] }}/0.jpg"
        width="100%"
    >

    <h4>{{ l.title }}</h4>

</div>
{% endfor %}


<!-- ✅ SIMPLE SCRIPT -->
<script>
window.onload = function () {

    var items = document.getElementsByClassName("lesson-item");
    var player = document.getElementById("player");

    for (let i = 0; i < items.length; i++) {

        items[i].onclick = function () {

            var url = this.getAttribute("data-url");

            console.log("Playing:", url);  // DEBUG

            player.innerHTML = `
                <iframe width="100%" height="400"
                    src="${url}?autoplay=1"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            `;
        };
    }

};
</script>

{% endblock %}
