{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 850px; margin: auto;">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px;">
        <i class="fas fa-brain"></i> Mission Assessment
    </h2>

  <form method="POST" action="{{ url_for('quiz', course_id=course_id) }}">
        {% for q in questions %}
        <div style="margin-bottom: 35px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px;">
            <p style="font-size: 1.1rem; margin-top: 0;">
                <span style="color: var(--primary); font-weight: bold; margin-right: 10px;">Q{{ loop.index }}.</span>
                {{ q.question_text }}
            </p>

            <div style="margin-top: 15px; display: grid; gap: 10px;">
                {% for opt in q.options %}
                <label class="option-box">
              <div class="option-inner">
        <input type="radio" name="q{{ q.question_id }}" value="{{ opt.option_id }}" required>
        <span class="option-text">{{ opt.option_text }}</span>
    </div>
</label>
            
            </div>
        
        {% endfor %}

        {% if questions|length > 0 %}
            <button type="submit" class="btn" style="width: 100%; padding: 15px; font-size: 1.1rem;">
                <i class="fas fa-paper-plane"></i> Submit Mission Report
            </button>
        {% else %}
            <p style="text-align: center; color: #888;">No questions found in this assessment module.</p>
        {% endif %}
    </form>
</div>
{% endblock %}
