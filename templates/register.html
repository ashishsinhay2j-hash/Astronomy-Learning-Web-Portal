{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 40px auto; border-top: 5px solid var(--primary);">
    <h2 style="text-align: center;"><i class="fas fa-user-plus"></i> Recruit Explorer</h2>
    
    <form method="POST" action="{{ url_for('register') }}"></form>
        <label style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">USERNAME</label>
        <input type="text" name="username" placeholder="Choose your callsign" required>

        <label style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">EMAIL ADDRESS</label>
        <input type="email" name="email" placeholder="explorer@galaxy.com" required>

        <label style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">SECURE PASSWORD</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn" style="width: 100%; margin-top: 20px; padding: 15px;">Initiate Launch</button>
    </form>
    
    <p style="text-align: center; font-size: 0.9rem; margin-top: 20px;">
        Already registered? <a href="/login" style="color: var(--primary); text-decoration: none;">Login to Station</a>
    </p>
</div>
{% endblock %}
