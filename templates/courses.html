<h2>Courses</h2>

{% for c in courses %}
<div class="card">
    <h3>{{ c.title }}</h3>
    <p>{{ c.description }}</p>

    <iframe width="100%" height="250"
    src="{{ c.video_url }}"></iframe>

    <br><br>

    <a href="/course/{{ c.course_id }}" class="button">Open Course</a>
</div>
{% endfor %}
