{% extends "base.html" %}

{% block content %}

<h2>Courses</h2>

{% for c in courses %}
<div class="card">
    <h3>{{ c.course_name }}</h3>

    <a href="/enroll/{{ c.course_id }}" class="button">Enroll</a>
    <a href="/course/{{ c.course_id }}" class="button">View</a>
    <a href="/quiz/{{ c.course_id }}" class="button">Quiz</a>
</div>
{% endfor %}

{% endblock %}
