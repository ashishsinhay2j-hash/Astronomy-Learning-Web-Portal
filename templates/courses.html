{% extends "base.html" %}

{% block content %}
<h2>All Courses</h2>

<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap:20px;">

{% for c in courses %}
<div class="card">

    <h3>{{ c.title }}</h3>
    <p>{{ c.description }}</p>

    <a href="/course/{{ c.course_id }}" class="btn">View</a>
    <a href="/quiz/1">Take Quiz</a>

</div>
{% endfor %}

</div>

{% endblock %}
