<div class="card">
    <h2>Add Option</h2>

    <form method="POST">
        <input name="question_id" placeholder="Question ID" required>
        <input name="option_text" placeholder="Option text" required>

        <select name="is_correct">
            <option value="0">Wrong</option>
            <option value="1">Correct</option>
        </select>

        <button class="btn">Add</button>
    </form>
</div>
