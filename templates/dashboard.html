{% extends "base.html" %}
{% block content %}

<h2>Welcome back, {{ session.get("user") }} 👨‍🚀</h2>

<h3 style="margin-top:30px;">Your Courses</h3>

<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:20px;">

{% for c in courses %}
<div class="card">
    <h3>{{ c.title }}</h3>
    <p>{{ c.description }}</p>

    <a href="/course/{{ c.course_id }}" class="btn">View Course</a>
</div>
{% endfor %}

</div>

{% endblock %}
